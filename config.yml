# ========================================
# Nikkei LINE Tool 設定ファイル
# ========================================

# ユーザープロフィール（AIフィルタリングに使用）
user_profile:
  role: "中小企業の経営者"
  industry: "製造業"
  interests:
    - "製造業・ものづくりに関するトレンド"
    - "中小企業の経営課題・補助金・支援策"
    - "原材料・エネルギーコストの動向"
    - "サプライチェーン・調達"
    - "DX・製造業のデジタル化"
    - "人手不足・採用・労働市場"
    - "為替・金利など中小企業の財務に影響する動向"
    - "競合・業界再編の動き"

# AIフィルタリング設定
filter:
  # 1回の通知で送る記事の最大数
  max_articles: 5
  # この点数以上の記事を送る（10点満点）
  min_score: 6
  # AIへの補足指示（任意）
  additional_instructions: |
    以下の観点を重視してください:
    - 明日の経営判断に直接影響しうる情報を優先
    - 大企業向けではなく中小企業にも関係する内容を優先
    - 製造業特有のコスト・規制・技術動向を重視

# ニュース取得設定
news:
  # 何時間以内の記事を対象にするか
  hours_back: 24

  # ── RSS フィード ──────────────────────────────────
  rss_feeds:
    # NHK ニュース（ビジネス・経済）
    - name: "NHK 経済"
      url: "https://www.nhk.or.jp/rss/news/cat6.xml"
    # Yahoo!ニュース 経済
    - name: "Yahoo!ニュース 経済"
      url: "https://news.yahoo.co.jp/rss/categories/business.xml"
    # ITmedia ものづくり（製造業DX・技術動向）
    - name: "ITmedia ものづくり"
      url: "https://rss.itmedia.co.jp/rss/2.0/makoto.xml"

  # ── スクレイピング（RSS 非対応サイト）──────────────
  scrape_sites:
    # 日刊鉄鋼新聞（製造業・金属市況に特化した専門紙）
    - name: "日刊鉄鋼新聞"
      url: "https://www.japanmetaldaily.com/"
      # 記事タイトル付きリンクの CSS セレクタ
      article_selector: "a.top-headlines-item__ttl"
      # 日時セレクタ（記事リンクの直後の要素内）
      datetime_selector: "time.c-date"
      # リンクの基準 URL（相対パス解決用）
      base_url: "https://www.japanmetaldaily.com"

# LINE設定
line:
  # 通知する時刻（GitHub Actionsのcron用）
  # 平日の朝7:30 JST に通知
  schedule: "30 22 * * 0-4"  # UTC換算（JST -9h）
  # メッセージのヘッダー
  header: "📰 今日の注目ニュース"
  # フッター
  footer: "Powered by Nikkei × Claude"
