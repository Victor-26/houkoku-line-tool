# ========================================
# Nikkei LINE Tool 設定ファイル
# ========================================

# ユーザープロフィール（AIフィルタリングに使用）
user_profile:
  role: "中小企業の経営者"
  industry: "製造業"
  interests:
    - "製造業・ものづくりに関するトレンド"
    - "中小企業の経営課題・補助金・支援策"
    - "原材料・エネルギーコストの動向"
    - "サプライチェーン・調達"
    - "DX・製造業のデジタル化"
    - "人手不足・採用・労働市場"
    - "為替・金利など中小企業の財務に影響する動向"
    - "競合・業界再編の動き"
    - "水耕栽培・植物工場・農業テクノロジーの動向"
    - "マテハン（マテリアルハンドリング）・物流機器・自動搬送の動向"

# AIフィルタリング設定
filter:
  # 1回の通知で送る記事の最大数
  max_articles: 7
  # この点数以上の記事を送る（10点満点）
  min_score: 6
  # 2パスフィルタリング（品質優先）
  # 第1パスで候補を絞ってから、第2パスで最終選定する
  two_pass:
    enabled: true        # true にすると2段階評価（精度向上・API2回分）
    first_pass_limit: 20 # 第1パスで何件に絞るか

  # 使用するAIモデル（GitHub Models 経由・無料）
  # 高品質: gpt-4o（精度最高）
  # 標準:   gpt-4o-mini（高速・十分な精度・推奨）
  # 無料OSSモデル: meta-llama-3.1-70b-instruct
  model: "gpt-4o-mini"

  # APIリトライ設定（一時障害に対応）
  retry:
    max_attempts: 3      # 最大リトライ回数
    delay_seconds: 10    # リトライ間隔（秒）

  # AIへの補足指示（任意）
  additional_instructions: |
    以下の観点を重視してください:
    - 明日の経営判断に直接影響しうる情報を優先
    - 大企業向けではなく中小企業にも関係する内容を優先
    - 製造業特有のコスト・規制・技術動向を重視

# ニュース取得設定
news:
  # 何時間以内の記事を対象にするか（6時実行のため前日分をカバー）
  hours_back: 30

  # ── RSS フィード ──────────────────────────────────
  rss_feeds:
    # NHK ニュース（ビジネス・経済）
    - name: "NHK 経済"
      url: "https://www.nhk.or.jp/rss/news/cat6.xml"
    # Yahoo!ニュース 経済
    - name: "Yahoo!ニュース 経済"
      url: "https://news.yahoo.co.jp/rss/categories/business.xml"
    # ITmedia ものづくり（製造業DX・技術動向）
    - name: "ITmedia ものづくり"
      url: "https://rss.itmedia.co.jp/rss/2.0/makoto.xml"

  # ── スクレイピング（RSS 非対応サイト）──────────────
  scrape_sites:
    # 日刊鉄鋼新聞（製造業・金属市況に特化した専門紙）
    - name: "日刊鉄鋼新聞"
      url: "https://www.japanmetaldaily.com/"
      # 記事タイトル付きリンクの CSS セレクタ
      article_selector: "a.top-headlines-item__ttl"
      # 日時セレクタ（記事リンクの直後の要素内）
      datetime_selector: "time.c-date"
      # リンクの基準 URL（相対パス解決用）
      base_url: "https://www.japanmetaldaily.com"

# LINE設定
line:
  # 通知する時刻（GitHub Actionsのcron用）
  # 毎日 朝6:00 JST（土日含む）
  schedule: "0 21 * * *"  # UTC換算（JST -9h）
  # メッセージのヘッダー
  header: "📰 今日の注目ニュース"
  # フッター
  footer: "Powered by Nikkei × Claude"
