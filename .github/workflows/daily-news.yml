name: 毎朝ニュース通知

on:
  schedule:
    # 毎日 朝6:00 JST (= 前日 21:00 UTC) ※土日祝も含む
    - cron: "0 21 * * *"
  # 手動実行も可能
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    # 品質優先のため余裕を持ったタイムアウト設定
    timeout-minutes: 30
    # 必要最小限の権限のみ付与
    permissions:
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js をセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: 依存関係をインストール
        # npm ci はpackage-lock.jsonに従い再現性が高い
        run: npm ci

      - name: ニュースを取得してLINEに通知
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: node scripts/main.js
